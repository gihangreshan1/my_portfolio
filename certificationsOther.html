<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Certifications | Gihan Greshan</title>
   
    <link rel="stylesheet" href="style.css">

    <style>

        /* =====================================
   CERTIFICATIONS PAGE
===================================== */

#certifications {
    padding: 120px 10% 80px;
    min-height: 100vh;
}

#certifications .section-title {
    text-align: center;
    font-size: 2.8rem;
    margin-bottom: 50px;
    color: #ffffff;
}

.certificate-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

.certificate-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    transition: all 0.4s ease;
    text-align: center;
}

.certificate-card:hover {
    transform: translateY(-10px);
    border-color: #38bdf8;
    box-shadow: 0 15px 35px rgba(56, 189, 248, 0.25);
}

.certificate-card h3 {
    color: #38bdf8;
    margin-bottom: 15px;
    font-size: 1.3rem;
}

.certificate-card p {
    color: #cbd5e1;
    margin-bottom: 10px;
    line-height: 1.6;
}

.certificate-card::before {
    content: "🏆";
    display: block;
    font-size: 3rem;
    margin-bottom: 15px;
}

/* Certificate Button */

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 24px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s ease;
}

.primary {
    background: #38bdf8;
    color: white;
}

.primary:hover {
    background: #0ea5e9;
    transform: scale(1.05);
}

/* Header */

header {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(10px);
}

nav {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: #38bdf8;
    font-size: 1.8rem;
    font-weight: 700;
}

.nav-links {
    list-style: none;
}

.nav-links a {
    text-decoration: none;
    color: white;
}

/* Footer */

footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid rgba(255,255,255,0.1);
    color: #cbd5e1;
    margin-top: 50px;
}

/* Responsive */

@media (max-width: 768px) {

    #certifications {
        padding: 100px 5% 50px;
    }

    #certifications .section-title {
        font-size: 2rem;
    }

    .certificate-card {
        padding: 20px;
    }
}
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">Portfolio</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section id="certifications">
    <div class="section-title">Other Certifications</div>

    <div class="certificate-grid">

        <div class="certificate-card">
            <h3>IEEEXtreem 19.0 Coding Challanges</h3>
            <p>Issued by: IEEEXtreem </p>
            <p>Date Earned: Octomber 2025</p>
            <a href="https://drive.google.com/file/d/1VcYbVveqsBZylAhcERSemCqTv43RH4s7/view?usp=sharing"
               target="_blank"
               class="btn primary">
               View Certificate
            </a>
        </div>








    </div>
</section>

<footer>
    © 2026 Gihan Greshan | Software Engineering Undergraduate
</footer>

</body>
</html>
